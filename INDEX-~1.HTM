(function(){
  function showDiag(html) {
    var el = document.getElementById('__diag');
    if (el) { el.style.display = 'block'; el.innerHTML = html; }
  }
  window.addEventListener('error', function(e) {
    showDiag('<h2 style="color:#B5503F">Something went wrong</h2>' +
      '<p><b>Error:</b> ' + (e.message || 'unknown error') + '</p>' +
      '<p>This usually means this computer/network is blocking a required file, or there is a bug in the code. Try opening this same file on a different network (e.g. a phone hotspot) to check. If it still fails, copy this exact message back to Claude.</p>' +
      '<p style="font-size:12px;color:#746B7E">' + (e.filename ? (e.filename + ':' + e.lineno) : '') + '</p>');
  });
  window.addEventListener('unhandledrejection', function(e) {
    var reason = e.reason;
    var msg = (reason && (reason.message || reason.code)) ? (reason.message || reason.code) : String(reason);
    showDiag('<h2 style="color:#B5503F">Something went wrong (background task)</h2>' +
      '<p><b>Error:</b> ' + msg + '</p>' +
      '<p>This usually comes from the sign-in or cloud-save step. Copy this exact message back to Claude.</p>');
  });
  window.__libError = null;
  setTimeout(function() {
    var root = document.getElementById('root');
    if (window.__libError) {
      showDiag('<h2 style="color:#B5503F">This page could not load</h2>' +
        '<p><b>' + window.__libError + '</b></p>' +
        '<p>This almost always means this computer or network is blocking access to unpkg.com (common on locked-down work networks / firewalls).</p>' +
        '<p><b>Try this:</b> open this same file while connected to a different network (phone hotspot, home wifi) to confirm. If that works, ask IT to allow unpkg.com, or tell Claude and a fully offline version can be built instead.</p>');
    } else if (!root || !root.hasChildNodes()) {
      showDiag('<h2 style="color:#B5503F">This page did not load</h2>' +
        '<p>The app did not appear within 6 seconds. This could be a blocked network (see above) or a bug in the code.</p>' +
        '<p>Try a different network first. If it still does not work, tell Claude exactly what you see (or don’t see), including whether this is your work laptop or a personal one, and whether you are on office wifi.</p>');
    }
  }, 6000);
})();

function MiniLineChart({ data, xKey, yKey, color, height = 180, yDomain }) {
  const w = 560, h = height, padL = 30, padR = 12, padT = 10, padB = 24;
  const innerW = w - padL - padR, innerH = h - padT - padB;
  if (!data || data.length === 0) return null;
  const values = data.map((d) => Number(d[yKey]) || 0);
  const minY = yDomain ? yDomain[0] : Math.min(0, ...values);
  const maxY = yDomain ? yDomain[1] : Math.max(1, ...values);
  const span = maxY - minY || 1;
  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const scaleY = (v) => padT + innerH - ((v - minY) / span) * innerH;
  const points = data.map((d, i) => [padL + i * xStep, scaleY(Number(d[yKey]) || 0)]);
  const path = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  return (
    <svg viewBox={"0 0 " + w + " " + h} style={{ width: "100%", height }}>
      <line x1={padL} y1={padT} x2={padL} y2={padT + innerH} stroke="var(--line)" />
      <line x1={padL} y1={padT + innerH} x2={padL + innerW} y2={padT + innerH} stroke="var(--line)" />
      <path d={path} fill="none" stroke={color} strokeWidth="2" />
      {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill={color} />)}
      {data.map((d, i) => (
        <text key={i} x={padL + i * xStep} y={h - 6} fontSize="9" fill="var(--ink-soft)" textAnchor="middle">{String(d[xKey]).slice(0, 8)}</text>
      ))}
    </svg>
  );
}

function MiniBarChart({ data, xKey = "name", yKey = "value", color, horizontal = false, height = 180 }) {
  if (!data || data.length === 0) return null;
  const w = 560, h = height;
  const max = Math.max(1, ...data.map((d) => Number(d[yKey]) || 0));
  if (horizontal) {
    const rowH = Math.max(22, Math.floor((h - 10) / data.length));
    const labelW = 116, chartW = w - labelW - 44;
    const totalH = Math.max(h, rowH * data.length + 10);
    return (
      <svg viewBox={"0 0 " + w + " " + totalH} style={{ width: "100%", height: "auto" }}>
        {data.map((d, i) => {
          const val = Number(d[yKey]) || 0;
          const barW = (val / max) * chartW;
          const y = i * rowH + 6;
          return (
            <g key={i}>
              <text x={labelW - 8} y={y + rowH / 2 + 4} fontSize="10" fill="var(--ink-soft)" textAnchor="end">{String(d[xKey]).slice(0, 18)}</text>
              <rect x={labelW} y={y} width={Math.max(barW, 1)} height={rowH - 10} rx="4" fill={color} />
              <text x={labelW + barW + 6} y={y + rowH / 2 + 4} fontSize="10" fill="var(--ink-soft)">{val}</text>
            </g>
          );
        })}
      </svg>
    );
  }
  const barW = Math.max(20, Math.floor((w - 20) / data.length) - 10);
  const gap = (w - 20 - barW * data.length) / (data.length + 1);
  return (
    <svg viewBox={"0 0 " + w + " " + h} style={{ width: "100%", height }}>
      {data.map((d, i) => {
        const val = Number(d[yKey]) || 0;
        const barH = (val / max) * (h - 40);
        const x = 10 + gap * (i + 1) + barW * i;
        const y = h - 24 - barH;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={Math.max(barH, 1)} rx="4" fill={color} />
            <text x={x + barW / 2} y={Math.max(y - 4, 10)} fontSize="10" fill="var(--ink)" textAnchor="middle">{val}</text>
            <text x={x + barW / 2} y={h - 8} fontSize="9" fill="var(--ink-soft)" textAnchor="middle">{String(d[xKey]).slice(0, 10)}</text>
          </g>
        );
      })}
    </svg>
  );
}

function MiniPieChart({ data, colors }) {
  if (!data || data.length === 0) return null;
  const total = data.reduce((s, d) => s + (Number(d.value) || 0), 0) || 1;
  const r = 55, cx = 65, cy = 65;
  let angle = -90;
  const slices = data.map((d, i) => {
    const frac = (Number(d.value) || 0) / total;
    const start = angle;
    const end = angle + frac * 360;
    angle = end;
    const large = end - start > 180 ? 1 : 0;
    const toXY = (deg) => {
      const rad = (deg * Math.PI) / 180;
      return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
    };
    const [x1, y1] = toXY(start);
    const [x2, y2] = toXY(end);
    const path = "M " + cx + "," + cy + " L " + x1.toFixed(2) + "," + y1.toFixed(2) + " A " + r + "," + r + " 0 " + large + " 1 " + x2.toFixed(2) + "," + y2.toFixed(2) + " Z";
    return { path, color: colors[i % colors.length], name: d.name, value: d.value };
  });
  return (
    <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
      <svg viewBox="0 0 130 130" style={{ width: 130, height: 130, flexShrink: 0 }}>
        {slices.map((s, i) => <path key={i} d={s.path} fill={s.color} />)}
      </svg>
      <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
        {slices.map((s, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12 }}>
            <span style={{ width: 9, height: 9, borderRadius: 2, background: s.color, display: "inline-block" }} />
            <span>{s.name}: {s.value}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function fileToCompressedDataURL(file, maxDim, quality) {
  maxDim = maxDim || 1400;
  quality = quality || 0.8;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Could not read image"));
      img.onload = () => {
        let width = img.width, height = img.height;
        if (width > height && width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; }
        else if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQuotes = false;
  const pushField = () => { row.push(field); field = ""; };
  const pushRow = () => { pushField(); rows.push(row); row = []; };
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ",") pushField();
      else if (ch === "\r") { /* skip */ }
      else if (ch === "\n") pushRow();
      else field += ch;
    }
  }
  if (field.length || row.length) pushRow();
  const filtered = rows.filter((r) => r.some((c) => c.trim() !== ""));
  if (filtered.length === 0) return [];
  const headers = filtered[0].map((h) => h.trim());
  return filtered.slice(1).map((r) => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (r[i] || "").trim(); });
    return obj;
  });
}

function normHeader(h) {
  return h.toLowerCase().replace(/\s+/g, " ").trim();
}

function mapRowToProfile(row) {
  const profile = {};
  const noteParts = [];
  const leftovers = [];
  let fullName = "";
  Object.entries(row).forEach(([key, value]) => {
    if (!value) return;
    const norm = normHeader(key);
    const mapped = IMPORT_FIELD_MAP[norm];
    if (mapped === "fullName") { fullName = value; return; }
    if (mapped === "caseNotes") { noteParts.push(value); return; }
    if (mapped) { profile[mapped] = value; return; }
    leftovers.push(`${key}: ${value}`);
  });
  if (fullName && !profile.firstName && !profile.lastName) {
    const parts = fullName.trim().split(/\s+/);
    profile.firstName = parts[0] || "";
    profile.lastName = parts.slice(1).join(" ");
  }
  const guessedName = `${profile.firstName || ""} ${profile.lastName || ""}`.trim() || fullName.trim();
  const contentParts = [...noteParts];
  if (leftovers.length) contentParts.push("Other imported details:\n" + leftovers.join("\n"));
  const caseStudyText = contentParts.join("\n\n");
  return { profile, caseStudyText, guessedName };
}

async function storageGetJSON(key, fallback) {
  try {
    const snap = await db.collection("prismData").doc(key).get();
    if (!snap.exists) return fallback;
    const data = snap.data();
    return data && Object.prototype.hasOwnProperty.call(data, "value") ? data.value : fallback;
  } catch (e) {
    console.error("Cloud read failed for", key, e);
    return fallback;
  }
}
async function storageSetJSON(key, value) {
  try {
    await db.collection("prismData").doc(key).set({ value });
  } catch (e) {
    console.error("Cloud save failed for", key, e);
    alert("Couldn't save to the cloud \u2014 check your internet connection. This change may not have been saved, please try again.");
  }
}
async function storageRemove(key) {
  try {
    await db.collection("prismData").doc(key).delete();
  } catch (e) {
    console.error("Cloud delete failed for", key, e);
    alert("Couldn't delete from the cloud \u2014 check your internet connection and try again.");
  }
}

    <div className="empty-state">
      <Icon size={28} strokeWidth={1.4} />
      <h4>{title}</h4>
      <p>{body}</p>
    </div>
  );
}

/* ---------------------------------- Add / Edit Person ---------------------------------- */

function PersonForm({ initial, onCancel, onSave, saving }) {
  const [p, setP] = useState(() => ({ ...emptyProfile(), ...(initial || {}) }));
  const set = (k) => (e) => {
    const v = e && e.target ? (e.target.type === "checkbox" ? e.target.checked : e.target.value) : e;
    setP((prev) => ({ ...prev, [k]: v }));
  };
  const toggleND = (opt) => setP((prev) => {
    const has = (prev.neurodivergence || []).includes(opt);
    return { ...prev, neurodivergence: has ? prev.neurodivergence.filter((o) => o !== opt) : [...(prev.neurodivergence || []), opt] };
  });
  const canSave = p.firstName.trim() && p.lastName.trim();

  return (
    <div className="panel-card">
      <h3 className="section-title">{initial ? "Edit young person's details" : "Add a young person to the register"}</h3>
      <div className="form-grid">
        <Field label="First name *"><input value={p.firstName} onChange={set("firstName")} /></Field>
        <Field label="Last name *"><input value={p.lastName} onChange={set("lastName")} /></Field>
        <Field label="Date of birth"><input type="date" value={p.dob} onChange={set("dob")} /></Field>
        <Field label="Gender"><input value={p.gender} onChange={set("gender")} placeholder="Optional" /></Field>
        <Field label="Ethnicity">
          <select value={p.ethnicity} onChange={set("ethnicity")}>
            <option value="">Prefer not to say / not stated</option>
            {ETHNICITY_OPTIONS.map((o) => <option key={o} value={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="Gender identity">
          <select value={p.genderIdentity} onChange={set("genderIdentity")}>
            <option value="">Not stated</option>
            {GENDER_IDENTITY_OPTIONS.map((o) => <option key={o} value={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="Sexual orientation">
          <select value={p.sexualOrientation} onChange={set("sexualOrientation")}>
            <option value="">Not stated</option>
            {SEXUAL_ORIENTATION_OPTIONS.map((o) => <option key={o} value={o}>{o}</option>)}
          </select>
        </Field>
        <Field label="Date joined project"><input type="date" value={p.joinDate} onChange={set("joinDate")} /></Field>
        <Field label="Status">
          <select value={p.status} onChange={set("status")}>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
            <option value="left">Left project</option>
          </select>
        </Field>
        <Field label="Address"><input value={p.address} onChange={set("address")} /></Field>
        <Field label="Phone"><input value={p.phone} onChange={set("phone")} /></Field>
        <Field label="Email"><input value={p.email} onChange={set("email")} /></Field>
        <Field label="Parent / guardian name"><input value={p.guardianName} onChange={set("guardianName")} /></Field>
        <Field label="Guardian relationship"><input value={p.guardianRelationship} onChange={set("guardianRelationship")} placeholder="e.g. Mother, Foster carer" /></Field>
        <Field label="Guardian phone"><input value={p.guardianPhone} onChange={set("guardianPhone")} /></Field>
        <Field label="Emergency contact name"><input value={p.emergencyContactName} onChange={set("emergencyContactName")} /></Field>
        <Field label="Emergency contact phone"><input value={p.emergencyContactPhone} onChange={set("emergencyContactPhone")} /></Field>
      </div>
      <Field label="Neurodivergence (select all that apply)" hint="Optional \u2014 used only for anonymised demographic reporting">
        <div className="consent-row" style={{ flexWrap: "wrap" }}>
          {NEURODIVERGENCE_OPTIONS.map((o) => (
            <label key={o} className="chk"><input type="checkbox" checked={(p.neurodivergence || []).includes(o)} onChange={() => toggleND(o)} /> {o}</label>
          ))}
        </div>
      </Field>
      <Field label="Medical / access notes" hint="Allergies, conditions, access needs staff should know about">
        <textarea rows={3} value={p.medicalNotes} onChange={set("medicalNotes")} />
      </Field>
      <Field label="General notes"><textarea rows={2} value={p.generalNotes} onChange={set("generalNotes")} /></Field>
      <div className="consent-row">
        <label className="chk"><input type="checkbox" checked={p.consentPhotography} onChange={set("consentPhotography")} /> Consent given for photography</label>
        <label className="chk"><input type="checkbox" checked={p.consentDataSharing} onChange={set("consentDataSharing")} /> Consent given for data sharing</label>
      </div>
      <div className="btn-row">
        <button className="btn ghost" onClick={onCancel}>Cancel</button>
        <button className="btn primary" disabled={!canSave || saving} onClick={() => onSave(p)}>
          {saving ? <Loader2 size={15} className="spin" /> : <Save size={15} />} Save details
        </button>
      </div>
    </div>
  );
}

/* ---------------------------------- Person Detail (the "file") ---------------------------------- */

const TABS = [
  { id: "overview", label: "Overview", icon: FileText },
  { id: "attendance", label: "Attendance", icon: ClipboardList },
  { id: "feedback", label: "Feedback", icon: MessageSquare },
  { id: "casestudies", label: "Case studies", icon: FileText },
  { id: "goals", label: "Personal goals", icon: Target },
  { id: "swemwebs", label: "Wellbeing (SWEMWEBS)", icon: HeartPulse },
  { id: "engagement", label: "Wider participation", icon: Handshake },
];

function PersonDetail({ record, onBack, onEdit, onUpdate, onArchive, onDelete }) {
  const [tab, setTab] = useState("overview");
  const [saving, setSaving] = useState(false);
  const p = record.profile;

  const persist = async (next) => {
    setSaving(true);
    await onUpdate(next);
    setSaving(false);
  };

  return (
    <div className="file-wrap">
      <div className="file-topbar">
        <button className="btn ghost small" onClick={onBack}><ChevronLeft size={15} /> Back to register</button>
        <div className="file-topbar-actions">
          {saving && <span className="saving-indicator"><Loader2 size={13} className="spin" /> Saving…</span>}
          <button className="btn ghost small" onClick={onEdit}>Edit details</button>
          <button className="btn ghost small" onClick={onArchive}><Archive size={14} /> {p.status === "active" ? "Archive" : "Reactivate"}</button>
          <button className="btn ghost small danger" onClick={onDelete}><X size={14} /> Delete permanently</button>
        </div>
      </div>

      <div className="file-head">
        <div className="file-avatar">{(p.firstName[0] || "?") + (p.lastName[0] || "")}</div>
        <div>
          <h2>{p.firstName} {p.lastName}</h2>
          <div className="file-meta">
            {p.dob && <span>{age(p.dob)} yrs old · DOB {fmtDate(p.dob)}</span>}
            <StatusPill status={p.status} />
          </div>
        </div>
      </div>

      <div className="tab-strip">
        {TABS.map((t) => {
          const Icon = t.icon;
          return (
            <button key={t.id} className={"tab-divider" + (tab === t.id ? " active" : "")} onClick={() => setTab(t.id)}>
              <Icon size={14} /> {t.label}
            </button>
          );
        })}
      </div>

      <div className="file-body">
        {tab === "overview" && <OverviewTab record={record} />}
        {tab === "attendance" && <AttendanceTab record={record} persist={persist} />}
        {tab === "feedback" && <FeedbackTab record={record} persist={persist} />}
        {tab === "casestudies" && <CaseStudiesTab record={record} persist={persist} />}
        {tab === "goals" && <GoalsTab record={record} persist={persist} />}
        {tab === "swemwebs" && <SwemwebsTab record={record} persist={persist} />}
        {tab === "engagement" && <EngagementTab record={record} persist={persist} />}
      </div>
    </div>
  );
}

  return (
    <div>
      <div className="stat-row">
        <div className="stat-card"><span className="stat-num">{attended}</span><span className="stat-label">Sessions attended</span></div>
        <div className="stat-card"><span className="stat-num">{activeGoals}</span><span className="stat-label">Active goals</span></div>

        <div className="stat-card"><span className="stat-num">{record.caseStudies.length}</span><span className="stat-label">Case studies logged</span></div>
      </div>
      <div className="panel-card">
        <h4 className="section-title">Contact &amp; guardian details</h4>
        <div className="kv-grid">
          <div><span>Phone</span><b>{p.phone || "—"}</b></div>
          <div><span>Email</span><b>{p.email || "—"}</b></div>
          <div><span>Address</span><b>{p.address || "—"}</b></div>
          <div><span>Guardian</span><b>{p.guardianName || "—"} {p.guardianRelationship && `(${p.guardianRelationship})`}</b></div>
          <div><span>Guardian phone</span><b>{p.guardianPhone || "—"}</b></div>
          <div><span>Emergency contact</span><b>{p.emergencyContactName || "—"} {p.emergencyContactPhone && `· ${p.emergencyContactPhone}`}</b></div>

        </div>

function AttendanceTab({ record, persist }) {
  const sorted = [...record.attendance].sort((a, b) => (a.date < b.date ? 1 : -1));
  const remove = (sessionId) => persist({ ...record, attendance: record.attendance.filter((a) => a.sessionId !== sessionId) });
  if (!sorted.length) return <EmptyState icon={ClipboardList} title="No attendance recorded yet" body="Take a register from the Sessions view and it will show up here." />;
  return (
    <div className="panel-card">
      <h4 className="section-title">Session history</h4>
      <table className="reg-table">
        <thead><tr><th>Date</th><th>Session</th><th>Attended</th><th>Note</th><th></th></tr></thead>
        <tbody>
          {sorted.map((a) => (
            <tr key={a.sessionId}>
              <td className="mono">{fmtDate(a.date)}</td>
              <td>{a.title}</td>
              <td>{a.attended ? <span className="tick-yes"><Check size={14} /></span> : <span className="tick-no"><X size={14} /></span>}</td>
              <td className="notes-cell">{a.note || "—"}</td>
              <td>
                <button type="button" className="btn ghost small" title="Delete this attendance record"
                  onClick={() => { if (window.confirm("Delete this attendance record? This can\'t be undone.")) remove(a.sessionId); }}>
                  <X size={13} />
                </button>
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ComposerList({ title, emptyIcon, emptyLabel, items, renderItem, onAdd, addForm }) {
  const [adding, setAdding] = useState(false);
  return (
    <div>
      <div className="list-head">
        <h4 className="section-title">{title}</h4>
        <button className="btn primary small" onClick={() => setAdding(!adding)}>
          <Plus size={14} /> {adding ? "Close" : "Add new"}
        </button>
      </div>
      {adding && (
        <div className="panel-card composer">
          {addForm((entry) => { onAdd(entry); setAdding(false); })}
        </div>
      )}
      {items.length === 0 && !adding ? (
        <EmptyState icon={emptyIcon} title={emptyLabel} body="Nothing logged yet — use “Add new” to create the first entry." />
      ) : (
        <div className="entry-list">{items.map(renderItem)}</div>
      )}
    </div>
  );
}

function FeedbackTab({ record, persist }) {
  const items = [...record.feedback].sort((a, b) => (a.date < b.date ? 1 : -1));
  const add = (entry) => persist({ ...record, feedback: [...record.feedback, entry] });
  const remove = (id) => persist({ ...record, feedback: record.feedback.filter((f) => f.id !== id) });
  return (
    <ComposerList
      title="Feedback"
      emptyIcon={MessageSquare}
      emptyLabel="No feedback logged"
      items={items}
      onAdd={add}
      renderItem={(f) => (
        <div className="entry-card" key={f.id}>
          <EntryDeleteBtn onDelete={() => remove(f.id)} label="Delete this feedback entry" />

          <p className="notes-text">{f.content}</p>

function CaseStudyForm({ onSave, photoHint }) {
  const [date, setDate] = useState(today());
  const [author, setAuthor] = useState("");
  const [title, setTitle] = useState("");
  const [content, setContent] = useState("");
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setBusy(true);
    try {
      const dataUrl = await fileToCompressedDataURL(file);
      setPhoto(dataUrl);
    } catch (err) {
      alert("Sorry, that photo couldn't be read.");
    }
    setBusy(false);
  };

  return (
    <div>
      <Field label="Date"><input type="date" value={date} onChange={(e) => setDate(e.target.value)} /></Field>
      <Field label="Recorded by"><input value={author} onChange={(e) => setAuthor(e.target.value)} /></Field>
      <Field label="Title"><input value={title} onChange={(e) => setTitle(e.target.value)} /></Field>
      <Field label="Case study"><textarea rows={6} value={content} onChange={(e) => setContent(e.target.value)} /></Field>
      <Field label="Photo evidence (optional)" hint={photoHint || "Only attach photos where you have photography consent on file. Photos are automatically resized to keep the file small."}>
        <input type="file" accept="image/*" onChange={onFile} />
        {busy && <span className="muted small-note">Processing photo…</span>}
        {photo && <img src={photo} alt="" style={{ maxWidth: 180, borderRadius: 8, marginTop: 8, display: "block" }} />}
      </Field>
      <div className="btn-row">
        <button className="btn primary" disabled={busy} onClick={() => content.trim() && onSave({ id: uid(), date, author: author || "Staff", title: title || "Untitled", content, photo: photo || null })}>
          <Save size={14} /> Save
        </button>
      </div>
    </div>
  );
}

function BulkImportView({ roster, onImport }) {
  const [candidates, setCandidates] = useState([]);
  const [processing, setProcessing] = useState(false);
  const [result, setResult] = useState(null);
  const [libError, setLibError] = useState(null);

  const findMatch = (name) => {
    const n = (name || "").trim().toLowerCase();
    if (!n) return null;
    const m = roster.find((r) => r.name.trim().toLowerCase() === n);
    return m ? m.id : null;
  };

  const handleFiles = async (fileList) => {
    setProcessing(true);
    setResult(null);
    const files = Array.from(fileList);
    const next = [];
    for (const file of files) {
      const ext = file.name.split(".").pop().toLowerCase();
      try {
        if (ext === "csv") {
          const text = await file.text();
          const rows = parseCSV(text);
          if (rows.length === 0) { next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "No data rows found in this CSV." }); continue; }
          rows.forEach((row, i) => {
            const { profile, caseStudyText, guessedName } = mapRowToProfile(row);
            const matchId = findMatch(guessedName);
            next.push({ key: file.name + "-r" + i, source: file.name, guessedName: guessedName || `(row ${i + 1}, no name found)`, profile, caseStudyText, action: matchId ? "merge" : "create", targetId: matchId });
          });
        } else if (ext === "xlsx" || ext === "xls") {
          if (typeof XLSX === "undefined") { setLibError("Spreadsheet support (xlsx) didn't load — check your internet connection and try again."); next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "Spreadsheet library not available." }); continue; }
          const buf = await file.arrayBuffer();
          const wb = XLSX.read(buf, { type: "array" });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
          if (rows.length === 0) { next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "No data rows found in this spreadsheet." }); continue; }
          rows.forEach((row, i) => {
            const { profile, caseStudyText, guessedName } = mapRowToProfile(row);
            const matchId = findMatch(guessedName);
            next.push({ key: file.name + "-r" + i, source: file.name, guessedName: guessedName || `(row ${i + 1}, no name found)`, profile, caseStudyText, action: matchId ? "merge" : "create", targetId: matchId });
          });
        } else if (ext === "docx") {
          if (typeof mammoth === "undefined") { setLibError("Word document support (mammoth) didn't load — check your internet connection and try again."); next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "Word document library not available." }); continue; }
          const buf = await file.arrayBuffer();
          const res = await mammoth.extractRawText({ arrayBuffer: buf });
          const guessedName = file.name.replace(/\.docx$/i, "").replace(/[_\-]+/g, " ").trim();
          const matchId = findMatch(guessedName);
          const parts = guessedName.split(/\s+/);
          next.push({
            key: file.name, source: file.name, guessedName,
            profile: { firstName: parts[0] || "", lastName: parts.slice(1).join(" ") },
            caseStudyText: res.value.trim(),
            action: matchId ? "merge" : "create", targetId: matchId,
          });
        } else {
          next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "Unsupported file type — only .csv, .xlsx, .xls and .docx are supported." });
        }
      } catch (e) {
        next.push({ key: file.name, source: file.name, action: "skip", guessedName: file.name, error: "Couldn't read this file: " + (e.message || e) });
      }
    }
    setCandidates((prev) => [...prev, ...next]);
    setProcessing(false);
  };

  const updateCandidate = (key, patch) => setCandidates((prev) => prev.map((c) => (c.key === key ? { ...c, ...patch } : c)));
  const removeCandidate = (key) => setCandidates((prev) => prev.filter((c) => c.key !== key));

  const importable = candidates.filter((c) => c.action !== "skip" && !c.error);

  const runImport = async () => {
    const items = importable.map((c) => ({
      action: c.action,
      targetId: c.targetId,
      profile: c.profile,
      caseStudy: c.caseStudyText && c.caseStudyText.trim()
        ? { id: uid(), date: today(), author: "Import", title: `Imported from ${c.source}`, content: c.caseStudyText.trim(), photo: null }
        : null,
    }));
    await onImport(items);
    setResult({ count: items.length });
    setCandidates((prev) => prev.filter((c) => c.action === "skip" || c.error));
  };

  return (
    <div>
      <h3 className="section-title"><Upload size={16} /> Import case files</h3>
      <p className="muted small-note" style={{ marginBottom: 14 }}>
        Bring in case files you've already written — spreadsheets (.csv, .xlsx) with a row per young person, or Word documents (.docx) with case notes for one person each. Check the matches below before importing so no one gets duplicated.
      </p>
      {libError && <p style={{ color: "var(--brick)" }}>{libError}</p>}
      <label className="btn primary" style={{ cursor: "pointer", display: "inline-flex", width: "fit-content" }}>
        <Upload size={15} /> Choose files
        <input type="file" multiple accept=".csv,.xlsx,.xls,.docx" style={{ display: "none" }}
          onChange={(e) => { if (e.target.files.length) handleFiles(e.target.files); e.target.value = ""; }} />
      </label>
      {processing && <p className="muted small-note" style={{ marginTop: 10 }}>Reading files…</p>}
      {result && <p className="notes-text" style={{ marginTop: 10 }}>Imported {result.count} record{result.count === 1 ? "" : "s"}. Add more files above, or head to the register to check them.</p>}
      {candidates.length > 0 && (
        <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 10 }}>
          {candidates.map((c) => (
            <div key={c.key} className="entry-card">
              {!c.error && <EntryDeleteBtn onDelete={() => removeCandidate(c.key)} label="Remove from import" />}
              <div className="mono muted small-note">{c.source}</div>
              {c.error ? (
                <p style={{ color: "var(--brick)" }}>{c.error}</p>
              ) : (
                <>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 6, flexWrap: "wrap" }}>
                    <input
                      value={c.guessedName}
                      onChange={(e) => {
                        const name = e.target.value;
                        const parts = name.split(/\s+/);
                        updateCandidate(c.key, { guessedName: name, profile: { ...c.profile, firstName: parts[0] || "", lastName: parts.slice(1).join(" ") } });
                      }}
                      style={{ fontWeight: 600, minWidth: 180 }}
                    />
                    <select value={c.action} onChange={(e) => updateCandidate(c.key, { action: e.target.value })}>
                      <option value="create">Add as new person</option>
                      <option value="merge">Merge into existing person</option>
                      <option value="skip">Skip this one</option>
                    </select>
                    {c.action === "merge" && (
                      <select value={c.targetId || ""} onChange={(e) => updateCandidate(c.key, { targetId: e.target.value })}>
                        <option value="">Choose person…</option>
                        {roster.map((r) => <option key={r.id} value={r.id}>{r.name}</option>)}
                      </select>
                    )}
                  </div>
                  {c.caseStudyText && (
                    <p className="muted small-note" style={{ marginTop: 6, whiteSpace: "pre-wrap" }}>
                      Will add to Case studies: {c.caseStudyText.slice(0, 160)}{c.caseStudyText.length > 160 ? "…" : ""}
                    </p>
                  )}
                </>
              )}
            </div>
          ))}
          {importable.length > 0 && (
            <button className="btn primary" style={{ width: "fit-content" }} onClick={runImport}>
              <Save size={15} /> Import {importable.length} record{importable.length === 1 ? "" : "s"}
            </button>
          )}
        </div>
      )}
    </div>
  );
}

function GoalsTab({ record, persist }) {

  const updateGoal = (id, patch) =>
    persist({ ...record, goals: record.goals.map((g) => (g.id === id ? { ...g, ...patch } : g)) });
  const addProgress = (id, note) =>
    persist({

function FormBody({ fields, onSave }) {
  const [, force] = useState(0);
  return (
    <div>
      {fields.map((f, i) => (
        <Field key={i} label={f.label}>
          {f.type === "textarea" ? (
            <textarea rows={f.rows || 3} defaultValue={f.value} onChange={(e) => { f.set(e.target.value); }} />
          ) : f.type === "select" ? (
            <select defaultValue={f.value} onChange={(e) => { f.set(e.target.value); }}>
              {(f.options || []).map((o) => <option key={o} value={o}>{o}</option>)}
            </select>
          ) : (
            <input type={f.type} defaultValue={f.value} onChange={(e) => { f.set(e.target.value); }} />
          )}
        </Field>
      ))}
      <div className="btn-row">
        <button className="btn primary" onClick={() => { onSave(); force((n) => n + 1); }}><Save size={14} /> Save</button>

    </div>
  );
}

function SessionsView({ roster, sessions, peopleCache, onEnsureLoaded, onCreateSession, onSaveRegister, onDeleteSession, onAddCasual, onRemoveCasual }) {
  const [creating, setCreating] = useState(false);
  const [activeSessionId, setActiveSessionId] = useState(null);
  const sorted = [...sessions].sort((a, b) => (a.date < b.date ? 1 : -1));

  const openRegister = async (sessionId) => {
    await onEnsureLoaded(roster.map((r) => r.id));
    setActiveSessionId(sessionId);
  };

  if (activeSessionId) {
    const session = sessions.find((s) => s.id === activeSessionId);
    return (
      <TakeRegister
        session={session}
        roster={roster}
        peopleCache={peopleCache}
        onBack={() => setActiveSessionId(null)}
        onSave={(attendanceMap, generalNotes) => onSaveRegister(session, attendanceMap, generalNotes)}
        onAddCasual={onAddCasual}
        onRemoveCasual={onRemoveCasual}
      />
    );
  }

  return (
    <div>
      <div className="list-head">
        <h3 className="section-title">Sessions</h3>
        <button className="btn primary small" onClick={() => setCreating(!creating)}><Plus size={14} /> {creating ? "Close" : "New session"}</button>
      </div>
      {creating && (
        <div className="panel-card composer">
          <NewSessionForm onSave={(s) => { onCreateSession(s); setCreating(false); }} />
        </div>
      )}
      {sorted.length === 0 && !creating ? (
        <EmptyState icon={Calendar} title="No sessions yet" body="Create a session to start taking the register." />
      ) : (
        <div className="entry-list">
          {sorted.map((s) => (
            <div className="entry-card session-row" key={s.id}>
              <div>
                <div className="entry-head"><span className="mono">{fmtDate(s.date)}</span><span className="pill" style={{ background: "var(--sage-bg)", color: "var(--sage)" }}>{s.type || "Prism session"}</span>{(s.casualAttendees || []).length > 0 && <span className="pill" style={{ background: "var(--amber-bg)", color: "var(--amber)" }}>+{s.casualAttendees.length} drop-in</span>}</div>
                <h5>{s.title}</h5>
                {s.description && <p className="notes-text">{s.description}</p>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn ghost small" onClick={() => openRegister(s.id)}><ClipboardList size={14} /> Take / view register</button>
                <button className="btn ghost small danger" onClick={() => onDeleteSession(s.id)}><X size={14} /> Delete</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

        </button>

function TakeRegister({ session, roster, peopleCache, onBack, onSave, onAddCasual, onRemoveCasual }) {
  const [attendance, setAttendance] = useState(() => {
    const init = {};
    roster.forEach((r) => {
      const rec = peopleCache[r.id];
      const existing = rec && rec.attendance.find((a) => a.sessionId === session.id);
      init[r.id] = { attended: existing ? existing.attended : false, note: existing ? existing.note : "" };
    });
    return init;
  });
  const [saving, setSaving] = useState(false);
  const [generalNotes, setGeneralNotes] = useState(session.generalNotes || "");
  const [casualName, setCasualName] = useState("");

  const toggle = (id) => setAttendance((prev) => ({ ...prev, [id]: { ...prev[id], attended: !prev[id].attended } }));
  const setNote = (id, val) => setAttendance((prev) => ({ ...prev, [id]: { ...prev[id], note: val } }));

  const save = async () => {
    setSaving(true);
    await onSave({ ...attendance }, generalNotes);
    setSaving(false);
  };

  const addCasual = () => {
    if (!casualName.trim()) return;
    onAddCasual(session.id, { id: uid(), name: casualName.trim() });
    setCasualName("");
  };

  const activeRoster = roster.filter((r) => r.status !== "left");
  const presentCount = Object.values(attendance).filter((a) => a.attended).length;
  const casualAttendees = session.casualAttendees || [];

  return (
    <div>
      <div className="file-topbar">
        <button className="btn ghost small" onClick={onBack}><ChevronLeft size={15} /> Back to sessions</button>
        {saving && <span className="saving-indicator"><Loader2 size={13} className="spin" /> Saving…</span>}
      </div>
      <h3 className="section-title">{session.title} · <span className="mono">{fmtDate(session.date)}</span></h3>
      <p className="notes-text" style={{ marginBottom: 14 }}>{presentCount} of {activeRoster.length} registered present{casualAttendees.length > 0 ? ` · ${casualAttendees.length} drop-in` : ""}</p>
      <div className="panel-card">
        <table className="reg-table">
          <thead><tr><th>Name</th><th>Attended</th><th>Session note (optional)</th></tr></thead>
          <tbody>
            {activeRoster.map((r) => (
              <tr key={r.id}>
                <td>{r.name}</td>
                <td>
                  <button className={"check-toggle" + (attendance[r.id]?.attended ? " on" : "")} onClick={() => toggle(r.id)}>
                    {attendance[r.id]?.attended ? <Check size={16} /> : ""}
                  </button>
                </td>
                <td><input className="table-input" value={attendance[r.id]?.note || ""} onChange={(e) => setNote(r.id, e.target.value)} placeholder="—" /></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="panel-card">
        <h4 className="section-title">One-off / drop-in attendees</h4>
        <p className="muted small-note" style={{ marginTop: -8 }}>For young people who came to this session but aren\'t on the register yet — counts towards reach without creating a full file.</p>
        <div className="inline-add">
          <input placeholder="Name (or initials)" value={casualName} onChange={(e) => setCasualName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") addCasual(); }} />
          <button className="btn ghost small" onClick={addCasual}><Plus size={14} /> Add</button>
        </div>
        {casualAttendees.length > 0 && (
          <ul className="progress-list" style={{ marginTop: 10 }}>
            {casualAttendees.map((c) => (
              <li key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>{c.name}</span>
                <button type="button" className="btn ghost small" onClick={() => onRemoveCasual(session.id, c.id)}><X size={13} /></button>
              </li>
            ))}
          </ul>
        )}
      </div>
      <div className="panel-card">
        <Field label="General session notes"><textarea rows={3} value={generalNotes} onChange={(e) => setGeneralNotes(e.target.value)} /></Field>
      </div>
      <div className="btn-row">
        <button className="btn primary" onClick={save}><Save size={15} /> Save register</button>
      </div>
    </div>
  );
}

/* ---------------------------------- Funders report ---------------------------------- */

function StatBlock({ num, label }) {
  return <div className="stat-card"><span className="stat-num">{num}</span><span className="stat-label">{label}</span></div>;
}

function FundersReportView({ roster, peopleCache, sessions }) {
  const [start, setStart] = useState(() => {
    const d = new Date(); d.setDate(d.getDate() - 90);
    return d.toISOString().slice(0, 10);
  });
  const [end, setEnd] = useState(today());

  const setPreset = (days) => {
    if (days === "all") { setStart("2000-01-01"); setEnd(today()); return; }
    const d = new Date(); d.setDate(d.getDate() - days);
    setStart(d.toISOString().slice(0, 10));
    setEnd(today());
  };

  const people = roster.map((r) => ({ ...r, rec: peopleCache[r.id] })).filter((x) => x.rec);
  const notYetLoaded = roster.length - people.length;

  const engagedIds = new Set();
  const attendanceRows = [];
  const communityRows = [];
  const volunteeringRows = [];
  const ccardRows = [];
  const signpostingRows = [];
  const goalsRows = [];
  const swemwebsRows = [];

  people.forEach(({ id, rec }) => {
    (rec.attendance || []).forEach((a) => {
      if (a.attended && inRange(a.date, start, end)) { engagedIds.add(id); attendanceRows.push({ ...a, personId: id }); }
    });
    (rec.communityProjects || []).forEach((c) => { if (inRange(c.date, start, end)) { engagedIds.add(id); communityRows.push({ ...c, personId: id }); } });
    (rec.volunteering || []).forEach((v) => { if (inRange(v.date, start, end)) { engagedIds.add(id); volunteeringRows.push({ ...v, personId: id }); } });
    (rec.ccard || []).forEach((c) => { if (inRange(c.date, start, end)) { engagedIds.add(id); ccardRows.push({ ...c, personId: id }); } });
    (rec.signposting || []).forEach((s) => { if (inRange(s.date, start, end)) { engagedIds.add(id); signpostingRows.push({ ...s, personId: id }); } });
    (rec.goals || []).forEach((g) => { if (inRange(g.dateSet, start, end)) { engagedIds.add(id); goalsRows.push({ ...g, personId: id }); } });
    (rec.swemwebs || []).forEach((s) => { if (inRange(s.date, start, end)) { engagedIds.add(id); swemwebsRows.push({ ...s, personId: id }); } });
  });

  const engagedPeople = people.filter((p) => engagedIds.has(p.id));

  const genderCounts = {};
  const ethnicityCounts = {};
  const ageBandCounts = {};
  const neurodivergenceCounts = {};
  const genderIdentityCounts = {};
  const orientationCounts = {};
  engagedPeople.forEach(({ rec }) => {
    const g = (rec.profile.gender || "").trim() || "Not stated";
    genderCounts[g] = (genderCounts[g] || 0) + 1;
    const e = rec.profile.ethnicity || "Not stated";
    ethnicityCounts[e] = (ethnicityCounts[e] || 0) + 1;
    const band = ageBandOf(rec.profile.dob, end);
    ageBandCounts[band] = (ageBandCounts[band] || 0) + 1;
    const nd = (rec.profile.neurodivergence && rec.profile.neurodivergence.length) ? rec.profile.neurodivergence : ["Not stated"];
    nd.forEach((tag) => { neurodivergenceCounts[tag] = (neurodivergenceCounts[tag] || 0) + 1; });
    const gi = rec.profile.genderIdentity || "Not stated";
    genderIdentityCounts[gi] = (genderIdentityCounts[gi] || 0) + 1;
    const so = rec.profile.sexualOrientation || "Not stated";
    orientationCounts[so] = (orientationCounts[so] || 0) + 1;
  });
  const genderData = Object.entries(genderCounts).map(([name, value]) => ({ name, value }));
  const ethnicityData = Object.entries(ethnicityCounts).map(([name, value]) => ({ name, value }));
  const ageBandData = AGE_BAND_ORDER.filter((b) => ageBandCounts[b]).map((name) => ({ name, value: ageBandCounts[name] }));
  const neurodivergenceData = Object.entries(neurodivergenceCounts).map(([name, value]) => ({ name, value }));
  const genderIdentityData = Object.entries(genderIdentityCounts).map(([name, value]) => ({ name, value }));
  const orientationData = Object.entries(orientationCounts).map(([name, value]) => ({ name, value }));

  const sessionMap = {};
  const typeCounts = {};
  attendanceRows.forEach((a) => {
    const key = a.sessionId;
    if (!sessionMap[key]) sessionMap[key] = { date: a.date, title: a.title, count: 0 };
    sessionMap[key].count += 1;
    const t = a.type || "Unspecified";
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });
  const attendanceTrend = Object.values(sessionMap).sort((a, b) => (a.date > b.date ? 1 : -1))
    .map((s) => ({ date: fmtDate(s.date), attendees: s.count }));
  const typeData = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]).map(([name, value]) => ({ name, value }));
  const totalAttendances = attendanceRows.length;
  const sessionsRun = Object.keys(sessionMap).length;
  const avgPerSession = sessionsRun ? Math.round((totalAttendances / sessionsRun) * 10) / 10 : 0;
  const dropInCount = (sessions || []).filter((s) => inRange(s.date, start, end)).reduce((sum, s) => sum + ((s.casualAttendees || []).length), 0);

  const goalStatusCounts = { active: 0, achieved: 0, paused: 0 };
  goalsRows.forEach((g) => { goalStatusCounts[g.status] = (goalStatusCounts[g.status] || 0) + 1; });
  const goalStatusData = [
    { name: "In progress", value: goalStatusCounts.active },
    { name: "Achieved", value: goalStatusCounts.achieved },
    { name: "Paused", value: goalStatusCounts.paused },
  ];
  const achievementRate = goalsRows.length ? Math.round((goalStatusCounts.achieved / goalsRows.length) * 100) : 0;

  const projectCounts = {};
  communityRows.forEach((c) => { projectCounts[c.title] = (projectCounts[c.title] || 0) + 1; });
  const projectData = Object.entries(projectCounts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name, value]) => ({ name, value }));
  const communityParticipants = new Set(communityRows.map((c) => c.personId)).size;

  const volunteeringHours = volunteeringRows.reduce((sum, v) => sum + (Number(v.hours) || 0), 0);
  const volunteeringParticipants = new Set(volunteeringRows.map((v) => v.personId)).size;

  const ccardRegistrations = ccardRows.filter((c) => c.event === "Registered").length;
  const ccardSupplyVisits = ccardRows.filter((c) => c.event === "Supply visit").length;
  const ccardItemsIssued = ccardRows.reduce((sum, c) => sum + (Number(c.quantity) || 0), 0);

  const signpostingOutcomeCounts = {};
  const signpostingServiceCounts = {};
  signpostingRows.forEach((s) => {
    signpostingOutcomeCounts[s.outcome] = (signpostingOutcomeCounts[s.outcome] || 0) + 1;
    signpostingServiceCounts[s.referredTo] = (signpostingServiceCounts[s.referredTo] || 0) + 1;
  });
  const signpostingOutcomeData = SIGNPOSTING_OUTCOMES.filter((o) => signpostingOutcomeCounts[o]).map((name) => ({ name, value: signpostingOutcomeCounts[name] }));
  const signpostingServiceData = Object.entries(signpostingServiceCounts).sort((a, b) => b[1] - a[1]).slice(0, 6).map(([name, value]) => ({ name, value }));

  const avgLatestScore = (() => {
    const latestByPerson = {};
    swemwebsRows.forEach((s) => {
      if (!latestByPerson[s.personId] || s.date > latestByPerson[s.personId].date) latestByPerson[s.personId] = s;
    });
    const vals = Object.values(latestByPerson).map((s) => s.total);
    return vals.length ? Math.round((vals.reduce((a, b) => a + b, 0) / vals.length) * 10) / 10 : null;
  })();
  const avgChange = (() => {
    const byPerson = {};
    engagedPeople.forEach(({ id, rec }) => { byPerson[id] = [...(rec.swemwebs || [])].sort((a, b) => (a.date < b.date ? -1 : 1)); });
    const changes = Object.values(byPerson).filter((arr) => arr.length >= 2).map((arr) => arr[arr.length - 1].total - arr[0].total);
    return changes.length ? Math.round((changes.reduce((a, b) => a + b, 0) / changes.length) * 10) / 10 : null;
  })();
  const wellbeingBandCounts = {};
  (() => {
    const latestByPerson = {};
    swemwebsRows.forEach((s) => {
      if (!latestByPerson[s.personId] || s.date > latestByPerson[s.personId].date) latestByPerson[s.personId] = s;
    });
    Object.values(latestByPerson).forEach((s) => {
      const band = swemwebsBand(s.total);
      wellbeingBandCounts[band] = (wellbeingBandCounts[band] || 0) + 1;
    });
  })();
  const wellbeingBandData = SWEMWEBS_BAND_ORDER.filter((b) => wellbeingBandCounts[b]).map((name) => ({ name, value: wellbeingBandCounts[name] }));

  return (
    <div className="report-wrap">
      <div className="file-topbar">
        <h2><BarChart3 size={20} /> Funders report</h2>
        <button className="btn ghost small" onClick={() => window.print()}><Printer size={14} /> Print / save as PDF</button>
      </div>

      <div className="panel-card report-controls">
        <div className="form-grid">
          <Field label="From"><input type="date" value={start} onChange={(e) => setStart(e.target.value)} /></Field>
          <Field label="To"><input type="date" value={end} onChange={(e) => setEnd(e.target.value)} /></Field>
        </div>
        <div className="btn-row" style={{ justifyContent: "flex-start" }}>
          <button className="btn ghost small" onClick={() => setPreset(90)}>Last 3 months</button>
          <button className="btn ghost small" onClick={() => setPreset(365)}>Last year</button>
          <button className="btn ghost small" onClick={() => setPreset("all")}>All time</button>
        </div>
        {notYetLoaded > 0 && <p className="muted small-note">Loading {notYetLoaded} more record(s)…</p>}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Reach &amp; attendance</h4>
        <p className="muted small-note" style={{ marginTop: -8 }}>Reach = unique registered young people with at least one recorded activity in this period. Drop-in attendees (below) are additional and not included in this figure since they don't have a file.</p>
        <div className="stat-row">
          <StatBlock num={engagedIds.size} label="Registered reach (unique)" />
          <StatBlock num={sessionsRun} label="Sessions run" />
          <StatBlock num={totalAttendances} label="Total attendances" />
          <StatBlock num={avgPerSession} label="Avg attendees / session" />
        </div>
        <div className="stat-row">
          <StatBlock num={dropInCount} label="Drop-in / one-off attendees" />
          <StatBlock num={engagedIds.size + dropInCount} label="Combined reach (registered + drop-in)" />
        </div>
        {attendanceTrend.length > 1 && (
          <div style={{ width: "100%", height: 200 }}>
            <MiniLineChart data={attendanceTrend} xKey="date" yKey="attendees" color="var(--teal)" />
          </div>
        )}
        {typeData.length > 0 && (
          <div style={{ marginTop: 14 }}>
            <h5>Attendance by session type</h5>
            <MiniBarChart data={typeData} color="var(--brick)" horizontal />
          </div>
        )}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Demographics</h4>
        {engagedIds.size === 0 ? (
          <p className="muted small-note">No engagement recorded in this period yet.</p>
        ) : (
          <div className="small-charts-grid">
            <div className="chart-box">
              <h5>Gender</h5>
              <MiniPieChart data={genderData} colors={CHART_COLORS} />
            </div>
            <div className="chart-box">
              <h5>Ethnicity</h5>
              <MiniPieChart data={ethnicityData} colors={CHART_COLORS} />
            </div>
            <div className="chart-box">
              <h5>Age band</h5>
              <MiniBarChart data={ageBandData} color="var(--teal)" />
            </div>
            <div className="chart-box">
              <h5>Neurodivergence</h5>
              <MiniPieChart data={neurodivergenceData} colors={CHART_COLORS} />
            </div>
            <div className="chart-box">
              <h5>Gender identity</h5>
              <MiniPieChart data={genderIdentityData} colors={CHART_COLORS} />
            </div>
            <div className="chart-box">
              <h5>Sexual orientation</h5>
              <MiniPieChart data={orientationData} colors={CHART_COLORS} />
            </div>
          </div>
        )}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Wellbeing (SWEMWEBS)</h4>
        <div className="stat-row">
          <StatBlock num={avgLatestScore != null ? avgLatestScore : "—"} label="Avg latest score / 35" />
          <StatBlock num={avgChange != null ? (avgChange > 0 ? `+${avgChange}` : avgChange) : "—"} label="Avg score change" />
          <StatBlock num={swemwebsRows.length} label="Assessments in period" />
        </div>
        {wellbeingBandData.length > 0 && (
          <div style={{ width: "100%", height: 180 }}>
            <MiniBarChart data={wellbeingBandData} color="var(--sage)" />
          </div>
        )}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Personal goals progress</h4>
        <div className="stat-row">
          <StatBlock num={goalsRows.length} label="Goals set in period" />
          <StatBlock num={goalStatusCounts.achieved} label="Achieved" />
          <StatBlock num={`${achievementRate}%`} label="Achievement rate" />
        </div>
        {goalsRows.length > 0 && (
          <div style={{ width: "100%", height: 180 }}>
            <MiniBarChart data={goalStatusData} color="var(--amber)" />
          </div>
        )}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Community projects</h4>
        <div className="stat-row">
          <StatBlock num={communityRows.length} label="Entries logged" />
          <StatBlock num={communityParticipants} label="Unique participants" />
        </div>
        {projectData.length > 0 && (
          <div style={{ width: "100%", height: 180 }}>
            <MiniBarChart data={projectData} color="var(--brick)" horizontal />
          </div>
        )}
      </div>

      <div className="panel-card">
        <h4 className="section-title">Volunteering</h4>
        <div className="stat-row">
          <StatBlock num={volunteeringHours} label="Total hours" />
          <StatBlock num={volunteeringParticipants} label="Unique volunteers" />
          <StatBlock num={volunteeringRows.length} label="Entries logged" />
        </div>
      </div>

      <div className="panel-card">
        <h4 className="section-title">C-Card scheme</h4>
        <div className="stat-row">
          <StatBlock num={ccardRegistrations} label="New registrations" />
          <StatBlock num={ccardSupplyVisits} label="Supply visits" />
          <StatBlock num={ccardItemsIssued} label="Items issued" />
        </div>
      </div>

      <div className="panel-card">
        <h4 className="section-title">Signposting &amp; social prescribing</h4>
        <div className="stat-row">
          <StatBlock num={signpostingRows.length} label="Referrals made" />
          <StatBlock num={Object.keys(signpostingServiceCounts).length} label="Services used" />
        </div>
        {signpostingOutcomeData.length > 0 && (
          <div className="small-charts-grid">
            <div className="chart-box">
              <h5>Outcomes</h5>
              <MiniPieChart data={signpostingOutcomeData} colors={CHART_COLORS} />
            </div>
            <div className="chart-box">
              <h5>Top services referred to</h5>
              <MiniBarChart data={signpostingServiceData} color="var(--teal-dark)" horizontal />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------------------------- App ---------------------------------- */

function App({ onSignOut }) {
  const [roster, setRoster] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [collective, setCollective] = useState([]);
  const [staff, setStaff] = useState([]);
  const [peopleCache, setPeopleCache] = useState({});
  const [view, setView] = useState("welcome"); // welcome | person | sessions | addPerson | editPerson
  const [selectedId, setSelectedId] = useState(null);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(true);
  const [savingForm, setSavingForm] = useState(false);

  useEffect(() => {
    (async () => {
      const r = await storageGetJSON(KEYS.roster, []);
      const s = await storageGetJSON(KEYS.sessions, []);
      const c = await storageGetJSON(KEYS.collective, []);
      const st = await storageGetJSON(KEYS.staff, []);
      setRoster(r);
      setSessions(s);
      setCollective(c);
      setStaff(st);
      setLoading(false);
    })();
  }, []);

  const addCollective = async (entry) => {
    const next = [...collective, entry];
    setCollective(next);
    await storageSetJSON(KEYS.collective, next);
  };
  const deleteCollective = async (id) => {
    if (!window.confirm("Delete this case study? This can't be undone.")) return;
    const next = collective.filter((c) => c.id !== id);
    setCollective(next);
    await storageSetJSON(KEYS.collective, next);
  };
  const addStaff = async (entry) => {
    const next = [...staff, entry];
    setStaff(next);
    await storageSetJSON(KEYS.staff, next);
  };
  const deleteStaff = async (id) => {
    if (!window.confirm("Remove this person? This can't be undone.")) return;
    const next = staff.filter((p) => p.id !== id);
    setStaff(next);
    await storageSetJSON(KEYS.staff, next);
  };

  const ensureLoaded = useCallback(async (ids) => {
    const missing = ids.filter((id) => !peopleCache[id]);
    if (missing.length === 0) return;
    const fetched = await Promise.all(missing.map((id) => storageGetJSON(KEYS.person(id), null)));
    setPeopleCache((prev) => {
      const next = { ...prev };
      missing.forEach((id, i) => { if (fetched[i]) next[id] = fetched[i]; });
      return next;
    });
  }, [peopleCache]);

  const selectPerson = async (id) => {
    await ensureLoaded([id]);
    setSelectedId(id);
    setView("person");
  };

  const openFundersReport = async () => {
    await ensureLoaded(roster.map((r) => r.id));
    setView("fundersReport");
  };

  const exportAll = async () => {
    const ids = roster.map((r) => r.id);
    const people = {};
    await Promise.all(ids.map(async (id) => {
      people[id] = await storageGetJSON(KEYS.person(id), null);
    }));
    const bundle = { exportedAt: new Date().toISOString(), roster, sessions, people };
    const blob = new Blob([JSON.stringify(bundle, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "project-prism-backup-" + today() + ".json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const importAll = async (file) => {
    try {
      const text = await file.text();
      const bundle = JSON.parse(text);
      if (!bundle || !Array.isArray(bundle.roster)) { alert("That doesn't look like a Project Prism backup file."); return; }
      await storageSetJSON(KEYS.roster, bundle.roster);
      await storageSetJSON(KEYS.sessions, bundle.sessions || []);
      await Promise.all(Object.entries(bundle.people || {}).map(([id, rec]) => storageSetJSON(KEYS.person(id), rec)));
      alert("Import complete. The app will now reload.");
      window.location.reload();
    } catch (e) {
      alert("Couldn't read that file \u2014 make sure it's a Project Prism backup JSON file.");
    }
  };

  const savePerson = async (profileData) => {
    setSavingForm(true);
    const isEdit = view === "editPerson" && selectedId;
    if (isEdit) {
      const rec = peopleCache[selectedId];
      const nextRec = { ...rec, profile: profileData };
      await storageSetJSON(KEYS.person(selectedId), nextRec);
      setPeopleCache((prev) => ({ ...prev, [selectedId]: nextRec }));
      const nextRoster = roster.map((r) => (r.id === selectedId ? { ...r, name: `${profileData.firstName} ${profileData.lastName}`, dob: profileData.dob, status: profileData.status } : r));
      setRoster(nextRoster);
      await storageSetJSON(KEYS.roster, nextRoster);
      setView("person");
    } else {
      const id = uid();
      const rec = emptyRecord(profileData);
      const rosterEntry = { id, name: `${profileData.firstName} ${profileData.lastName}`, dob: profileData.dob, status: profileData.status };
      const nextRoster = [...roster, rosterEntry];
      await storageSetJSON(KEYS.person(id), rec);
      await storageSetJSON(KEYS.roster, nextRoster);
      setRoster(nextRoster);
      setPeopleCache((prev) => ({ ...prev, [id]: rec }));
      setSelectedId(id);
      setView("person");
    }
    setSavingForm(false);
  };

  const updatePersonRecord = async (nextRec) => {
    await storageSetJSON(KEYS.person(selectedId), nextRec);
    setPeopleCache((prev) => ({ ...prev, [selectedId]: nextRec }));
  };

  const bulkImportRecords = async (items) => {
    let nextRoster = [...roster];
    const cacheUpdates = {};
    for (const item of items) {
      if (item.action === "create") {
        const id = uid();
        const profile = { ...emptyProfile(), ...item.profile };
        const rec = emptyRecord(profile);
        if (item.caseStudy) rec.caseStudies = [item.caseStudy];
        await storageSetJSON(KEYS.person(id), rec);
        nextRoster.push({ id, name: `${profile.firstName} ${profile.lastName}`.trim() || "Unnamed", dob: profile.dob, status: profile.status || "active" });
        cacheUpdates[id] = rec;
      } else if (item.action === "merge" && item.targetId) {
        const existing = peopleCache[item.targetId] || (await storageGetJSON(KEYS.person(item.targetId), null));
        if (!existing) continue;
        const mergedProfile = { ...existing.profile };
        Object.entries(item.profile || {}).forEach(([k, v]) => {
          if (v !== "" && v != null && !existing.profile[k]) mergedProfile[k] = v;
        });
        const nextCaseStudies = item.caseStudy ? [...existing.caseStudies, item.caseStudy] : existing.caseStudies;
        const nextRec = { ...existing, profile: mergedProfile, caseStudies: nextCaseStudies };
        await storageSetJSON(KEYS.person(item.targetId), nextRec);
        cacheUpdates[item.targetId] = nextRec;
        nextRoster = nextRoster.map((r) => (r.id === item.targetId ? { ...r, name: `${mergedProfile.firstName} ${mergedProfile.lastName}`.trim() || r.name, dob: mergedProfile.dob || r.dob } : r));
      }
    }
    setRoster(nextRoster);
    await storageSetJSON(KEYS.roster, nextRoster);
    setPeopleCache((prev) => ({ ...prev, ...cacheUpdates }));
  };

  const archivePerson = async () => {
    const rec = peopleCache[selectedId];
    const newStatus = rec.profile.status === "active" ? "inactive" : "active";
    const nextRec = { ...rec, profile: { ...rec.profile, status: newStatus } };
    await updatePersonRecord(nextRec);
    const nextRoster = roster.map((r) => (r.id === selectedId ? { ...r, status: newStatus } : r));
    setRoster(nextRoster);
    await storageSetJSON(KEYS.roster, nextRoster);
  };

  const deletePerson = async () => {
    if (!selectedId) return;
    if (!window.confirm("Permanently delete this young person and all their records? This can't be undone.")) return;
    const id = selectedId;
    const nextRoster = roster.filter((r) => r.id !== id);
    setRoster(nextRoster);
    await storageSetJSON(KEYS.roster, nextRoster);
    await storageRemove(KEYS.person(id));
    setPeopleCache((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
    setSelectedId(null);
    setView("welcome");
  };

  const deleteSession = async (sessionId) => {
    if (!window.confirm("Delete this session and all its attendance records? This can't be undone.")) return;
    const nextSessions = sessions.filter((s) => s.id !== sessionId);
    setSessions(nextSessions);
    await storageSetJSON(KEYS.sessions, nextSessions);
    const ids = roster.map((r) => r.id);
    await Promise.all(ids.map(async (id) => {
      const rec = await storageGetJSON(KEYS.person(id), null);
      if (!rec || !rec.attendance || !rec.attendance.some((a) => a.sessionId === sessionId)) return;
      const nextRec = { ...rec, attendance: rec.attendance.filter((a) => a.sessionId !== sessionId) };
      await storageSetJSON(KEYS.person(id), nextRec);
      setPeopleCache((prev) => (prev[id] ? { ...prev, [id]: nextRec } : prev));
    }));
  };

  const addCasualAttendee = async (sessionId, entry) => {
    const nextSessions = sessions.map((s) => (s.id === sessionId ? { ...s, casualAttendees: [...(s.casualAttendees || []), entry] } : s));
    setSessions(nextSessions);
    await storageSetJSON(KEYS.sessions, nextSessions);
  };

    setSessions(nextSessions);
    await storageSetJSON(KEYS.sessions, nextSessions);
  };

  const createSession = async (s) => {
    const next = [...sessions, s];
    setSessions(next);
    await storageSetJSON(KEYS.sessions, next);
  };

  const saveRegister = async (session, attendanceMap, generalNotes) => {
    const nextSessions = sessions.map((s) => (s.id === session.id ? { ...s, generalNotes } : s));
    setSessions(nextSessions);
    await storageSetJSON(KEYS.sessions, nextSessions);

      await storageSetJSON(KEYS.person(id), nextRec);
      setPeopleCache((prev) => ({ ...prev, [id]: nextRec }));
    }));
  };

function AuthGate() {
  const [user, setUser] = useState(undefined); // undefined = checking, null = signed out, object = signed in
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    if (FIREBASE_NOT_CONFIGURED) { setUser(null); return; }
    const unsub = firebase.auth().onAuthStateChanged((u) => setUser(u));
    return unsub;
  }, []);

  const login = async (e) => {
    e.preventDefault();
    setBusy(true);
    setError("");
    try {
      await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
    } catch (err) {
      setError(err && err.message ? err.message : "Couldn't sign in \u2014 check your email and password.");
    }
    setBusy(false);
  };

  const logout = () => firebase.auth().signOut();

  if (FIREBASE_NOT_CONFIGURED) {
    return (
      <div style={{ maxWidth: 560, margin: "60px auto", padding: 24, fontFamily: "sans-serif", lineHeight: 1.6 }}>
        <h2 style={{ color: "#4A2B70" }}>Cloud sync isn't set up yet</h2>
        <p>This copy of Project Prism hasn't been connected to a Firebase project, so it can't sync between devices.</p>
        <p>If you're seeing this by mistake, tell Claude and it can help you finish the setup.</p>
      </div>
    );
  }

  if (user === undefined) {
    return <div className="empty-state"><Loader2 className="spin" size={20} /> Checking sign-in…</div>;
  }

  if (!user) {
    return (
      <div style={{ maxWidth: 340, margin: "80px auto", padding: 24, textAlign: "center", fontFamily: "'Baloo 2', sans-serif" }}>
        <img src={LOGO_DATA_URI} alt="Project Prism logo" style={{ width: "100%", maxWidth: 200, margin: "0 auto 20px", display: "block" }} />
        <h2 style={{ color: "#4A2B70", marginBottom: 16 }}>Sign in</h2>
        <form onSubmit={login} style={{ textAlign: "left" }}>
          <Field label="Email"><input type="email" autoComplete="username" value={email} onChange={(e) => setEmail(e.target.value)} /></Field>
          <Field label="Password"><input type="password" autoComplete="current-password" value={password} onChange={(e) => setPassword(e.target.value)} /></Field>
          {error && <p style={{ color: "var(--brick)", fontSize: 13 }}>{error}</p>}
          <button className="btn primary full" disabled={busy} style={{ marginTop: 8 }}>{busy ? "Signing in…" : "Sign in"}</button>
        </form>
      </div>
    );
  }

  return <App onSignOut={logout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(AuthGate));

</script>
</body>
</html>
